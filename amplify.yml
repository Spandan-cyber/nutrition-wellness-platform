version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
  env:
    variables:
      VITE_GOOGLE_CLIENT_ID: 'YOUR_GOOGLE_CLIENT_ID_HERE'
